version: 2

models:

  - name: stg_airbyte__plc_tags
    description: >
      Variables PLC limpias y estandarizadas. Castea booleanos, extrae el
      prefijo de dirección lógica (%I/%Q/%M) y normaliza campos nulos.
      Una fila por variable del sistema PLC.
    columns:
      - name: tag_name
        description: Nombre único de la variable en el PLC (ej. MOTOR, STOP, V1)
        tests:
          - not_null           # test genérico 1
          - unique             # test genérico 2

      - name: data_type
        description: Tipo de dato de la variable (Bool, Int, Real, etc.)
        tests:
          - not_null           # test genérico 3

      - name: logical_address
        description: Dirección lógica completa (%I0.2, %Q0.0, %M0.1)
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              # test dbt-expectations 1: formato válido de dirección PLC
              regex: "^%(I|Q|M)\\d+\\.\\d+$"

      - name: address_prefix
        description: Prefijo de la zona del PLC (%I, %Q, %M)
        tests:
          - not_null
          - accepted_values:   # test genérico 4
              values: ['%I', '%Q', '%M']

      - name: is_hmi_visible
        description: Boolean — variable visible en pantalla HMI
        tests:
          - not_null           # test genérico 5

      - name: is_hmi_accessible
        description: Boolean — variable accesible para escritura desde HMI
        tests:
          - not_null

      - name: path_description
        description: Descripción del path de la tabla de variables en el PLC

      - name: tag_comment
        description: Comentario descriptivo (cadena vacía si era NULL en origen)

      - name: extracted_at
        description: Timestamp de extracción por Airbyte

  - name: stg_airbyte__repositories
    description: >
      Repositorios de GitHub limpios y estandarizados. Extrae nombre del
      repositorio y organización desde la clone_url y normaliza el campo
      archived a boolean. Una fila por repositorio de GitHub.
    columns:
      - name: repository_id
        description: ID numérico único del repositorio en GitHub
        tests:
          - not_null
          - unique

      - name: repository_name
        description: Nombre del repositorio extraído de la clone_url
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              # test dbt-expectations 2: nombres de repo tienen longitud razonable
              min_value: 1
              max_value: 100

      - name: organization_name
        description: Nombre de la organización/owner en GitHub
        tests:
          - not_null

      - name: is_archived
        description: Boolean — true si el repositorio está archivado
        tests:
          - not_null

      - name: clone_url
        description: URL completa para clonar el repositorio
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              # test dbt-expectations 3: URLs válidas de GitHub
              regex: "^https://github\\.com/.+/.+\\.git$"

      - name: updated_at
        description: Timestamp de la última actualización del repositorio

      - name: extracted_at
        description: Timestamp de extracción por Airbyte
